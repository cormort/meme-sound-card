<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極迷因音效控制板 v3.1 (RWD 響應式)</title>
    
    <link rel="preconnect" href="https://memeprod.sgp1.digitaloceanspaces.com">

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            font-family: '微軟正黑體', sans-serif;
            color: white;
            padding: 20px;
        }

        h2 { margin-bottom: 20px; color: #f1c40f; text-align: center; }

        /* 總容器：預設電腦版 4 個一排 */
        .keypad-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px;
            background-color: #333; 
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            max-width: 100%; /* 確保在大螢幕上不會破版 */
        }

        /* =========================================
           RWD 響應式排版魔法開始
           ========================================= */

        /* 平板、手機橫屏 (Landscape)：3 個一排 */
        @media (max-width: 900px) {
            .keypad-container { 
                grid-template-columns: repeat(3, 1fr); 
                padding: 20px; /* 稍微縮小面板內距 */
            }
        }

        /* 手機豎屏 (Portrait)：2 個一排 */
        @media (max-width: 600px) {
            .keypad-container { 
                grid-template-columns: repeat(2, 1fr); 
                padding: 15px;
                gap: 10px; /* 按鈕間的距離稍微縮小 */
            }
            .key {
                /* 手機版稍微縮小按鈕尺寸，確保放得下 */
                width: 100%; 
                min-width: 110px;
                height: 90px;
                font-size: 14px;
            }
        }

        /* ========================================= */

        .key {
            width: 130px;
            height: 100px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.3;
            transition: all 0.1s ease;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-sizing: border-box; /* 確保 padding 不會撐破寬度 */
        }

        .key:active { transform: translateY(5px); }

        /* 字體縮小輔助 class */
        .text-sm { font-size: 12px; }

        /* 法國賭神系列 (深藍色系) */
        .gambler { background-color: #2980b9; box-shadow: 0 6px 0 #1a5276; }
        .gambler:active { box-shadow: 0 2px 0 #1a5276; }

        /* 網路迷因系列 (紫色) */
        .meme { background-color: #8e44ad; box-shadow: 0 6px 0 #5b2c6f; }
        .meme:active { box-shadow: 0 2px 0 #5b2c6f; }
        
        /* 小明劍魔系列 (爆氣紅) */
        .jianmo { background-color: #c0392b; box-shadow: 0 6px 0 #7b241c; }
        .jianmo:active { box-shadow: 0 2px 0 #7b241c; }

        /* 烏薩奇系列 (兔兔黃) */
        .usagi { background-color: #f1c40f; box-shadow: 0 6px 0 #9b810d; }
        .usagi:active { box-shadow: 0 2px 0 #9b810d; }

        /* 底部聲明區塊 */
        .footer-disclaimer {
            margin-top: 30px;
            color: #777;
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
            max-width: 500px;
        }

    </style>
</head>
<body>

    <h2>Meme Soundboard v3.1<br><span style="font-size:14px; color:#aaa;">(旋轉手機看看！)</span></h2>

    <audio id="jianmo-sound" src="https://memeprod.sgp1.digitaloceanspaces.com/user-sound/db5831cbd78e5d181b0cd91272e5c962.mp3" preload="auto"></audio>

    <div class="keypad-container">
        
        <button class="key gambler" onclick="playSound('c8a897ea134ef5a0ad3667b31b9833ae.mp3')">我要驗牌</button>
        <button class="key gambler" onclick="playSound('5f337050afec9f21bde5ef0eb8a69359.mp3')">牌沒有問題</button>
        <button class="key gambler" onclick="playSound('b483cad203a1134326313d31b2d4e2ad.mp3')">給我擦皮鞋</button>
        <button class="key meme" onclick="playSound('90927ac35a83e150bf2941c16399c362.mp3')">意不意外<br>開不開心</button>

        <button class="key meme" onclick="playSound('8146c3fb2dd9b5de4301e92c5aa6f557.mp3')">啊對對對</button>
        <button class="key jianmo" onclick="playSegment('jianmo-sound', 0, 1.2)">回答我</button>
        <button class="key jianmo" onclick="playSegment('jianmo-sound', 1.2, 2.9)">look my eyes</button>
        <button class="key jianmo text-sm" onclick="playSegment('jianmo-sound', 2.9, 8.5)">tell me，why？<br>why？baby，why？</button>

        <button class="key usagi" onclick="playSound('f2875285ceac0752359dfa150b6782cf.mp3')">烏薩奇<br>蛤~</button>
        <button class="key usagi" onclick="playSound('5eba97221972295472e36b6227d73ffe.mp3')">烏薩奇<br>嗚啦</button>
        <button class="key usagi text-sm" onclick="playSound('8c754b0ef86d86d9d4a2c5b884510670.mp3')">嗚嗚啦啦嗚啦<br>嗚啦嘛呀 嗨呀哈</button>
        <button class="key usagi" onclick="playSound('bb5e22c2a79fe8c32b2236cb4f22941d.mp3')">嗚啦呀哈<br>呀哈嗚啦</button>

        <button class="key usagi" onclick="playSound('fbe75b82b89fde43a374cc8122a266d8.mp3')">噗嚕壓哈</button>
        <button class="key usagi" onclick="playSound('b407072470547a3e43cd8204023c6b77.mp3')">伊~呀哈~</button>
        <button class="key usagi" onclick="playSound('0ba03b325e9af4d9c7664a8e723b93e9.mp3')">噗魯~~~呀哈</button>
        <button class="key usagi" onclick="playSound('de1145ef6ca40a9935af49c77b91cb32.mp3')">噗魯~~~</button>

    </div>

    <div class="footer-disclaimer">
        聲明：本網頁程式碼與相關音效素材來源為 memes.tw，僅供程式教學、技術交流與個人娛樂使用，請勿用於任何商業營利用途。
    </div>

    <script>
        let currentAudio = null;
        let stopTimer = null;

        function stopAll() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            if (stopTimer) {
                clearTimeout(stopTimer);
            }
            const jianmo = document.getElementById('jianmo-sound');
            if (jianmo) {
                jianmo.pause();
            }
        }

        function playSound(fileName) {
            stopAll(); 
            const baseUrl = 'https://memeprod.sgp1.digitaloceanspaces.com/user-sound/';
            currentAudio = new Audio(baseUrl + fileName);
            currentAudio.play();
        }

        function playSegment(audioId, startTime, endTime) {
            stopAll(); 
            const audio = document.getElementById(audioId);
            if (audio) {
                audio.currentTime = startTime;
                audio.play();
                
                const duration = (endTime - startTime) * 1000;
                stopTimer = setTimeout(() => {
                    audio.pause();
                }, duration);
            }
        }
    </script>

</body>
</html>
